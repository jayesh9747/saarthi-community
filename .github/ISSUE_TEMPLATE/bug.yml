name: 🐛 Bug report
description: Something is broken or gives the wrong answer.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What went wrong?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How do we reproduce it?
      description: The exact question you asked your agent is usually enough.
      value: |
        1. Connected via …
        2. Asked: "…"
        3. Saarthi replied: "…"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true

  - type: input
    id: client
    attributes:
      label: AI client + version
      placeholder: Cursor 1.2 / Claude Code / Codex
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before you submit
      options:
        - label: I have removed any tokens, bearer headers, or other secrets from this report.
          required: true
